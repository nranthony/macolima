# Always-on overlay for the `therapod` profile.
# ---------------------------------------------------------------------------
# Layered by scripts/profile.sh whenever PROFILE=therapod, regardless of flags.
#
# SOLE JOB: declare that therapod needs the postgres sibling. profile.sh greps
# this overlay for a `depends_on: [postgres]` reference and auto-activates
# COMPOSE_PROFILES=db-postgres, so `scripts/profile.sh therapod up` brings the
# DB online without the caller setting the env var. (Side effect: claude-agent
# now waits for postgres to start — harmless, the agent needs the DB anyway.)
#
# The pipeline API is intentionally NOT defined here. It is owned by the
# pipeline repo and stood up *inside* the sandbox with the repo's own tooling —
# the identical flow a teammate not on macolima uses:
#     just sandbox up      # createdb + alembic upgrade head  (schema)
#     just sandbox serve   # uvicorn on localhost:8001, NO --reload
# `serve` (single PID, clean SIGTERM, backgroundable) is the form an automated
# agent wants — start it, poll /admin/ready, move on. `just sandbox api` is the
# same server WITH --reload, for a human editing by hand (the reloader's
# watcher+child tree is harder to kill/background cleanly).
#
# The API runs as a process in the agent container, reachable at localhost:8001
# (and via an in-container Vite proxy) — deliberately NOT published to the macOS
# host: sandbox-internal stays `internal: true`. So it needs no sibling
# container, no static IP, and no extra_hosts here. macolima owns infrastructure
# the agent can't provision itself (the postgres container, the network,
# egress); the pipeline repo owns everything that runs inside it and stays the
# single source of truth for how the API boots — which retires the port/flag
# drift a duplicated `uvicorn` definition here used to cause (it had drifted to
# :8000 vs the repo's :8001).
#
# LAN exposure of the Vite dev server (port 5173 → host LAN) lives in
# docker-compose.therapod.expose-dev.yml — opt-in via
# `scripts/profile.sh therapod up --expose-dev`.

services:
  claude-agent:
    depends_on: [postgres]
