# =============================================================================
# macolima — multi-profile hardened Claude Code stack
# =============================================================================
# This compose file is parameterized by PROFILE (e.g. work, personal, sideproject).
# Drive it via scripts/profile.sh, which sets COMPOSE_PROJECT_NAME=macolima-<profile>
# and exports PROFILE=<profile>. Each profile gets its own containers, its own
# networks, its own named volume, and its own persistent dirs on the drive.
#
# Network model: the agent container has NO direct network. All outbound HTTP(S)
# is forced through the per-profile egress-proxy (Squid) with a domain allowlist.
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Claude Code agent container
  # ---------------------------------------------------------------------------
  claude-agent:
    build:
      context: .
      dockerfile: Dockerfile
    image: macolima:latest
    container_name: claude-agent-${PROFILE:?PROFILE env var required — use scripts/profile.sh}
    hostname: claude-agent-${PROFILE}

    tmpfs:
      - /tmp:size=1g,noexec,nosuid,nodev
      - /run:size=64m,noexec,nosuid,nodev
      # uid/gid/mode: tmpfs mounts over Dockerfile-created dirs as root:root 755 by
      # default, blocking the non-root agent from writing. Force agent ownership.
      - /home/agent/.npm-global:size=512m,noexec,nosuid,nodev,uid=1000,gid=1000,mode=0755
      - /home/agent/.local:size=256m,noexec,nosuid,nodev,uid=1000,gid=1000,mode=0755

    security_opt:
      - no-new-privileges:true
      - seccomp=./seccomp.json

    cap_drop:
      - ALL

    # pids_limit is the cgroup-level cap; nproc ulimit was a redundant second
    # lever on the same number (512). Keep only pids_limit — covers all
    # processes in the namespace regardless of user.
    pids_limit: 512
    mem_limit: 8g
    memswap_limit: 8g
    cpus: 4
    ulimits:
      nofile:
        soft: 2048
        hard: 8192

    volumes:
      # Repo subtree for this profile (must already exist).
      - /Volumes/DataDrive/repo/${PROFILE}:/workspace:rw
      # Per-profile Claude state (tokens, sessions, settings, MCP).
      - /Volumes/DataDrive/.claude-colima/profiles/${PROFILE}/claude-home:/home/agent/.claude:rw
      # Per-profile .claude.json (oauthAccount, first-run state). chmod 644 on host.
      - /Volumes/DataDrive/.claude-colima/profiles/${PROFILE}/claude.json:/home/agent/.claude.json:rw
      # Per-profile cache (npm, uv, pip). Named volume in the VM's ext4 — a
      # virtiofs bind mount here breaks wheel extraction (uv chmod's .so files
      # post-extract; virtiofs returns EPERM). Same root cause as .vscode-server.
      # Cache is content-addressable, so loss on recreate is cheap.
      - cache:/home/agent/.cache:rw
      # Per-profile gh/glab tokens and git config (via GIT_CONFIG_GLOBAL below).
      # We mount .config/ (a directory) rather than .gitconfig (a file) — atomic
      # rename() during `git config --global` set fails across a single-file
      # bind mount with EBUSY. Directory mounts don't have that issue.
      - /Volumes/DataDrive/.claude-colima/profiles/${PROFILE}/config:/home/agent/.config:rw
      # Named volume for VS Code Server — avoids virtiofs utime issues.
      - vscode-server:/home/agent/.vscode-server:rw

    networks:
      - sandbox-internal
    env_file:
      # Optional DB creds — only present for profiles that opted into the
      # postgres/mongo sibling containers. required: false so profiles
      # without DBs still come up cleanly.
      - path: /Volumes/DataDrive/.claude-colima/profiles/${PROFILE}/db.env
        required: false
    environment:
      - HTTP_PROXY=http://egress-proxy:3128
      - HTTPS_PROXY=http://egress-proxy:3128
      - http_proxy=http://egress-proxy:3128
      - https_proxy=http://egress-proxy:3128
      - NO_PROXY=localhost,127.0.0.1,egress-proxy
      - MACOLIMA_PROFILE=${PROFILE}
      # Route git's global config through the mounted .config/ dir so it persists
      # across container recreates AND avoids single-file bind-mount EBUSY.
      - GIT_CONFIG_GLOBAL=/home/agent/.config/git/config
    depends_on:
      - egress-proxy

    working_dir: /workspace
    command: ["sleep", "infinity"]
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Optional: Postgres sibling (opt-in via COMPOSE_PROFILES=db-postgres)
  # ---------------------------------------------------------------------------
  # On sandbox-internal only — the agent reaches it at host `postgres:5432`.
  # Data lives in a named volume (macolima-<profile>_postgres-data) inside
  # the Colima VM's ext4, avoiding virtiofs UID/permission issues that bit
  # .vscode-server. Back up anything important with `pg_dump` to /workspace.
  # Credentials come from profiles/<profile>/db.env (template seeded by
  # scripts/profile.sh). File is optional — without POSTGRES_PASSWORD the
  # image refuses to start, which is the behavior we want.
  postgres:
    # Pinned by digest (postgres:18 as of 2026-04-24). Bump in lockstep with
    # host Homebrew postgresql@18 during upgrades. To refresh:
    #   docker pull postgres:18 && docker image inspect postgres:18 \
    #     --format '{{index .RepoDigests 0}}'
    image: postgres:18@sha256:78481659c47e862334611ccdaf7c369c986b3046da9857112f3b309114a65fb4
    container_name: postgres-${PROFILE}
    hostname: postgres
    profiles: ["db-postgres", "db-all"]
    env_file:
      - path: /Volumes/DataDrive/.claude-colima/profiles/${PROFILE}/db.env
        required: false
    volumes:
      # pg 18+ wants the mount at /var/lib/postgresql (not .../data); the
      # image manages a version-subdir inside to support pg_upgrade --link.
      - postgres-data:/var/lib/postgresql:rw
    networks:
      - sandbox-internal
    # Uncomment to expose to host GUI tools (TablePlus, DBeaver, psql on mac).
    # Loopback-only — do not bind 0.0.0.0.
    # ports:
    #   - "127.0.0.1:5432:5432"
    security_opt:
      - no-new-privileges:true
    mem_limit: 2g
    cpus: 2
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Optional: MongoDB sibling (opt-in via COMPOSE_PROFILES=db-mongo)
  # ---------------------------------------------------------------------------
  # Reach from the agent at host `mongo:27017`. Named volume for data.
  # If MONGO_INITDB_ROOT_USERNAME/PASSWORD are unset the image starts
  # without auth — that's acceptable on sandbox-internal (no external
  # reachability), but set them in db.env if you plan to publish the port.
  mongo:
    # Pinned by digest (mongo:8 as of 2026-04-24). To refresh:
    #   docker pull mongo:8 && docker image inspect mongo:8 \
    #     --format '{{index .RepoDigests 0}}'
    image: mongo:8@sha256:7abfba0d07c9330373f8173981ea4d09cd8a82cdf0e86ccaf7008848d1d24f62
    container_name: mongo-${PROFILE}
    hostname: mongo
    profiles: ["db-mongo", "db-all"]
    env_file:
      - path: /Volumes/DataDrive/.claude-colima/profiles/${PROFILE}/db.env
        required: false
    volumes:
      - mongo-data:/data/db:rw
    networks:
      - sandbox-internal
    # Uncomment to expose to host GUI tools (Compass, mongosh on mac).
    # ports:
    #   - "127.0.0.1:27017:27017"
    security_opt:
      - no-new-privileges:true
    mem_limit: 2g
    cpus: 2
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Egress proxy: per-profile, domain-allowlisted outbound traffic
  # ---------------------------------------------------------------------------
  egress-proxy:
    # Pinned by digest (ubuntu/squid:latest as of 2026-04-24). Squid is the
    # single choke-point for all agent egress, so an unvetted tag bump could
    # re-open a bypass. To refresh:
    #   docker pull ubuntu/squid:latest && docker image inspect ubuntu/squid:latest \
    #     --format '{{index .RepoDigests 0}}'
    image: ubuntu/squid:latest@sha256:6a097f68bae708cedbabd6188d68c7e2e7a38cedd05a176e1cc0ba29e3bbe029
    container_name: egress-proxy-${PROFILE}
    hostname: egress-proxy
    read_only: true
    tmpfs:
      # Squid starts as root (writes /run/squid.pid, opens cache.log) then
      # drops to user `proxy` (uid 13, baked into ubuntu/squid image) via
      # cache_effective_user. After drop, Squid opens access.log and writes
      # cache disk. Tmpfs ownership needs to satisfy both phases:
      #   /var/spool/squid  — post-drop only → proxy:proxy
      #   /var/log/squid    — cache.log (root) + access.log (proxy) → root:proxy 0775
      #   /run              — /run/squid.pid written by root → leave default
      - /var/spool/squid:size=256m,uid=13,gid=13,mode=0750
      - /var/log/squid:size=64m,uid=0,gid=13,mode=0775
      - /run:size=8m
    volumes:
      - ./proxy/squid.conf:/etc/squid/squid.conf:ro
      - ./proxy/allowed_domains.txt:/etc/squid/allowed_domains.txt:ro
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    security_opt:
      - no-new-privileges:true
    mem_limit: 512m
    cpus: 0.5
    networks:
      - sandbox-internal
      - sandbox-external
    restart: unless-stopped

networks:
  sandbox-internal:
    driver: bridge
    internal: true
  sandbox-external:
    driver: bridge

volumes:
  vscode-server:
  postgres-data:
  mongo-data:
  cache:
