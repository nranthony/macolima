# =============================================================================
# macolima — multi-profile hardened Claude Code stack
# =============================================================================
# This compose file is parameterized by PROFILE (e.g. work, personal, sideproject).
# Drive it via scripts/profile.sh, which sets COMPOSE_PROJECT_NAME=macolima-<profile>
# and exports PROFILE=<profile>. Each profile gets its own containers, its own
# networks, its own named volume, and its own persistent dirs on the drive.
#
# Network model: the agent container has NO direct network. All outbound HTTP(S)
# is forced through the per-profile egress-proxy (Squid) with a domain allowlist.
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Claude Code agent container
  # ---------------------------------------------------------------------------
  claude-agent:
    build:
      context: .
      dockerfile: Dockerfile
    image: macolima:latest
    container_name: claude-agent-${PROFILE:?PROFILE env var required — use scripts/profile.sh}
    hostname: claude-agent-${PROFILE}

    tmpfs:
      - /tmp:size=1g,noexec,nosuid,nodev
      - /run:size=64m,noexec,nosuid,nodev
      - /home/agent/.npm-global:size=512m,nosuid,nodev
      - /home/agent/.local:size=256m,nosuid,nodev

    security_opt:
      - no-new-privileges:true
      - seccomp=./seccomp.json

    cap_drop:
      - ALL

    pids_limit: 512
    mem_limit: 8g
    memswap_limit: 8g
    cpus: 4
    ulimits:
      nofile:
        soft: 2048
        hard: 8192
      nproc:
        soft: 512
        hard: 512

    volumes:
      # Repo subtree for this profile (must already exist).
      - /Volumes/DataDrive/repo/${PROFILE}:/workspace:rw
      # Per-profile Claude state (tokens, sessions, settings, MCP).
      - /Volumes/DataDrive/.claude-colima/profiles/${PROFILE}/claude-home:/home/agent/.claude:rw
      # Per-profile .claude.json (oauthAccount, first-run state). chmod 644 on host.
      - /Volumes/DataDrive/.claude-colima/profiles/${PROFILE}/claude.json:/home/agent/.claude.json:rw
      # Per-profile cache (npm, uv, pip).
      - /Volumes/DataDrive/.claude-colima/profiles/${PROFILE}/cache:/home/agent/.cache:rw
      # Per-profile gh/glab tokens and git config (via GIT_CONFIG_GLOBAL below).
      # We mount .config/ (a directory) rather than .gitconfig (a file) — atomic
      # rename() during `git config --global` set fails across a single-file
      # bind mount with EBUSY. Directory mounts don't have that issue.
      - /Volumes/DataDrive/.claude-colima/profiles/${PROFILE}/config:/home/agent/.config:rw
      # Named volume for VS Code Server — avoids virtiofs utime issues.
      - vscode-server:/home/agent/.vscode-server:rw

    networks:
      - sandbox-internal
    environment:
      - HTTP_PROXY=http://egress-proxy:3128
      - HTTPS_PROXY=http://egress-proxy:3128
      - http_proxy=http://egress-proxy:3128
      - https_proxy=http://egress-proxy:3128
      - NO_PROXY=localhost,127.0.0.1,egress-proxy
      - MACOLIMA_PROFILE=${PROFILE}
      # Route git's global config through the mounted .config/ dir so it persists
      # across container recreates AND avoids single-file bind-mount EBUSY.
      - GIT_CONFIG_GLOBAL=/home/agent/.config/git/config
    depends_on:
      - egress-proxy

    working_dir: /workspace
    command: ["sleep", "infinity"]
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Egress proxy: per-profile, domain-allowlisted outbound traffic
  # ---------------------------------------------------------------------------
  egress-proxy:
    image: ubuntu/squid:latest
    container_name: egress-proxy-${PROFILE}
    hostname: egress-proxy
    read_only: true
    tmpfs:
      - /var/spool/squid:size=256m
      - /var/log/squid:size=64m
      - /run:size=8m
    volumes:
      - ./proxy/squid.conf:/etc/squid/squid.conf:ro
      - ./proxy/allowed_domains.txt:/etc/squid/allowed_domains.txt:ro
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    security_opt:
      - no-new-privileges:true
    mem_limit: 512m
    cpus: 0.5
    networks:
      - sandbox-internal
      - sandbox-external
    restart: unless-stopped

networks:
  sandbox-internal:
    driver: bridge
    internal: true
  sandbox-external:
    driver: bridge

volumes:
  vscode-server:
